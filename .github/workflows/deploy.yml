name: Auto-Deploy on Push
on:
  push:
    branches: [main]

jobs:
  trigger-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger deploy via zonewise-web
        run: |
          curl -s -X POST \
            -H "Authorization: token ${{ secrets.GH_TOKEN }}" \
            -H "Accept: application/vnd.github.v3+json" \
            "https://api.github.com/repos/breverdbidder/zonewise-web/actions/workflows/deploy-loans.yml/dispatches" \
            -d '{"ref":"main"}'
          echo "🚀 Deploy triggered"
